AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de reseñas con S3, API, IA y Alertas.

Resources:
  # 1. BUCKET PARA LA WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. MENSAJERÍA Y ALERTAS
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 3. API GATEWAY
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors: "'*'"

  # 4. LAMBDA PRODUCTORA
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json'},
                    'body': json.dumps({'msg': 'Recibido'})
                }
            except Exception as e:
                return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi

  # 5. LAMBDA PROCESADORA (IA)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        comprehend = boto3.client('comprehend')
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            alerta_arn = os.environ['ALERTA_TOPIC_ARN']
            for record in event['Records']:
                sqs_body = json.loads(record['body'])
                sns_msg = json.loads(sqs_body['Message'])
                text = sns_msg.get('text', 'Sin texto')
                res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                if res['Sentiment'] == 'NEGATIVE':
                    sns.publish(TopicArn=alerta_arn, Message=f"Reseña negativa: {text}", Subject="Alerta")
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: !Ref AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10

  # PERMISOS SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "URL para el index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  WebsiteURL:
    Description: "URL de tu web"
    Value: !GetAtt FrontendBucket.WebsiteURL
