AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema completo de reseñas con Frontend, API y Análisis de IA.

Resources:
  # --- CAPA DE MENSAJERÍA (Lo que ya tenías) ---
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # --- CAPA DE ENTRADA (API + LAMBDA PRODUCER) ---
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors: "'*'" # Para que el navegador permita la conexión

  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Code:
        ZipFile: |
          import json, boto3, os
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                  return {
                      'statusCode': 200,
                      'headers': {'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json'},
                      'body': json.dumps({'msg': 'Reseña enviada a la cola'})
                  }
              except Exception as e:
                  return {'statusCode': 500, 'body': str(e)}

  # --- CAPA DE PROCESAMIENTO (Lambda Consumer) ---
  ProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json, boto3
          comprehend = boto3.client('comprehend')
          def lambda_handler(event, context):
              for record in event['Records']:
                  body = json.loads(record['body'])
                  msg = json.loads(body['Message'])
                  text = msg['text']
                  res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                  print(f"ANÁLISIS -> Texto: {text} | Sentimiento: {res['Sentiment']}")
              return {'status': 'done'}

  SqsEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      EventSourceArn: !GetAtt ProcessingQueue.Arn
      FunctionName: !Ref ProcessorFunction

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: ProcessorPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['sqs:ReceiveMessage', 'sqs:DeleteMessage', 'sqs:GetQueueAttributes', 'comprehend:DetectSentiment', 'logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: '*'

  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "URL de la API para el index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
