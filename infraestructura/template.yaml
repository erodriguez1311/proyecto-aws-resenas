AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de rese?as - VERSION FINAL SIN ERRORES SINTAXIS

Resources:
  # 1. BUCKET PARA LA WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*

  # 2. CAPA DE MENSAJER?A
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. CAPA DE ALERTAS (EMAIL)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: edu.rm1992@gmail.com # <--- CAMBIA ESTO POR TU EMAIL
      Protocol: email

  # 4. API GATEWAY
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: '''POST,OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''

 # 5. LAMBDA 1: RECIBE DE WEB Y MANDA A SNS
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            print(f"WEB RECIBIDA: {event['body']}") # LOG PARA VER QUE LLEGA DE LA WEB
            try:
                body = json.loads(event['body'])
                # Publicamos al SNS
                response = sns.publish(
                    TopicArn=os.environ['TOPIC_ARN'], 
                    Message=json.dumps(body)
                )
                print(f"SNS RESPONSE: {response}") # LOG PARA VER SI SNS ACEPTA EL MENSAJE
                return {
                    'statusCode': 200,
                    'headers': {'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json'},
                    'body': json.dumps({'msg': 'Enviado a SNS'})
                }
            except Exception as e:
                print(f"ERROR EN PRODUCTORA: {str(e)}")
                return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: { Ref: MainTopic }
      Policies:
        - SNSFullAccess
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: { Ref: MyApi }

# 6. LAMBDA PROCESADORA (IA + ALERTA) - VERSION CORREGIDA REGION
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      InlineCode: |
        import json, boto3, os

        def lambda_handler(event, context):
            # CREAMOS LOS CLIENTES DENTRO DE LA FUNCION PARA ASEGURAR LA REGION
            # Forzamos eu-west-1 porque en Estocolmo NO hay Comprehend
            comprehend = boto3.client('comprehend', region_name='eu-west-1')
            sns = boto3.client('sns', region_name='eu-north-1')
            
            alerta_arn = os.environ['ALERTA_TOPIC_ARN']
            print(f"EVENTO RECIBIDO: {json.dumps(event)}")
            
            for record in event.get('Records', []):
                try:
                    # Leemos el cuerpo del mensaje de SQS
                    sqs_body = json.loads(record['body'])
                    
                    # Si viene de SNS, el texto real está en el campo 'Message'
                    if isinstance(sqs_body, dict) and 'Message' in sqs_body:
                        inner_data = json.loads(sqs_body['Message'])
                        text = inner_data.get('text', str(inner_data))
                    else:
                        text = sqs_body.get('text', str(sqs_body))
                    
                    print(f"ANALIZANDO EN IRLANDA: {text}")
                    
                    # Llamada a la IA en Irlanda
                    res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                    sentiment = res['Sentiment']
                    print(f"SENTIMIENTO: {sentiment}")

                    if sentiment == 'NEGATIVE' or 'horrible' in text.lower():
                        print("ENVIANDO ALERTA...")
                        sns.publish(
                            TopicArn=alerta_arn,
                            Message=f"ALERTA RESEÑA: {text}",
                            Subject="Feedback Critico Detectado"
                        )
                except Exception as e:
                    print(f"ERROR INTERNO: {str(e)}")
            return {'status': 'ok'}
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: { Ref: AdminAlertTopic }
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSFullAccess
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: { Fn::GetAtt: [ProcessingQueue, Arn] }
            BatchSize: 1

  # PERMISO SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt ProcessingQueue.Arn

Outputs:
  ApiUrl:
    Value: !Sub https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send
  WebsiteURL:
    Value: !GetAtt FrontendBucket.WebsiteURL
