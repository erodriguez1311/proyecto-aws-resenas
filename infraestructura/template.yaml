AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de Feedback Final - CORREGIDO SIN ERRORES IAM

Resources:
  # 1. BUCKET PARA LA WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. CAPA DE MENSAJERÍA
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. CAPA DE ALERTA (EMAIL)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 4. API GATEWAY
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  # 5. LAMBDA PRODUCTORA
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {'Access-Control-Allow-Origin': '*'},
                    'body': json.dumps({'msg': 'OK'})
                }
            except Exception as e:
                return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action: "sns:Publish"
              Resource: !Ref MainTopic
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi

  # 6. LAMBDA PROCESADORA (CON TIMEOUT Y REGION FORZADA)
  FinalProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      InlineCode: |
        import json, boto3, os
        def lambda_handler(event, context):
            # Forzamos Irlanda porque Estocolmo no tiene Comprehend
            ia = boto3.client('comprehend', region_name='eu-west-1')
            sns = boto3.client('sns', region_name='eu-north-1')
            
            for record in event.get('Records', []):
                try:
                    sqs_body = json.loads(record['body'])
                    msg_content = json.loads(sqs_body['Message'])
                    text = msg_content.get('text', 'Sin texto')
                    
                    res = ia.detect_sentiment(Text=text, LanguageCode='es')
                    sentiment = res['Sentiment']
                    
                    if sentiment == 'NEGATIVE' or 'horrible' in text.lower():
                        sns.publish(
                            TopicArn=os.environ['ALERTA_ARN'],
                            Message=f"Alerta Critica: {text}",
                            Subject="Feedback Negativo"
                        )
                except Exception as e:
                    print(f"Error: {str(e)}")
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_ARN: !Ref AdminAlertTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action: 
                - "comprehend:DetectSentiment"
                - "sns:Publish"
                - "sqs:ReceiveMessage"
                - "sqs:DeleteMessage"
                - "sqs:GetQueueAttributes"
              Resource: "*"
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 1

  # PERMISO PARA QUE SNS ESCRIBA EN SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn

Outputs:
  ApiUrl:
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  WebsiteURL:
    Value: !GetAtt FrontendBucket.WebsiteURL
