AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema completo de reseñas (Frontend S3 + API + IA + Email).

Resources:
  # 1. EL BUCKET PARA LA WEB (FRONTEND)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html

  # Política para que el bucket sea público y se vea la web
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. CAPA DE MENSAJERÍA (DESACOPLAMIENTO)
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. CAPA DE ALERTAS (EMAIL)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 4. CAPA DE ENTRADA (API + PRODUCER)
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors: "'*'"

  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Code:
        ZipFile: |
          import json, boto3, os
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              body = json.loads(event['body'])
              sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
              return {
                  'statusCode': 200,
                  'headers': {'Access-Control-Allow-Origin': '*'},
                  'body': json.dumps({'msg': 'Recibido'})
              }

  # 5. CAPA DE PROCESAMIENTO E IA (CONSUMER)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: !Ref AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10
      Code:
        ZipFile: |
          import json, boto3, os
          comprehend = boto3.client('comprehend')
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              alerta_arn = os.environ['ALERTA_TOPIC_ARN']
              for record in event['Records']:
                  body = json.loads(record['body'])
                  msg = json.loads(body['Message'])
                  text = msg.get('text', 'Sin texto')
                  res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                  if res['Sentiment'] == 'NEGATIVE':
                      sns.publish(TopicArn=alerta_arn, Message=f"Reseña negativa: {text}", Subject="Alerta Negativa")
              return {'status': 'done'}

  # PERMISO SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "URL para el index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  WebsiteURL:
    Description: "URL de tu página web de reseñas"
    Value: !GetAtt FrontendBucket.WebsiteURL
