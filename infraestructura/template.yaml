AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de reseñas desacoplado con IA y Alerta por Email.

Resources:
  # 1. CAPA DE MENSAJERÍA (DESACOPLAMIENTO)
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 2. CAPA DE ALERTAS (EL EMAIL QUE FALTABA)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 3. CAPA DE ENTRADA (API + PRODUCER)
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors: "'*'"

  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Code:
        ZipFile: |
          import json, boto3, os
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                  return {
                      'statusCode': 200,
                      'headers': {'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json'},
                      'body': json.dumps({'msg': 'Recibido'})
                  }
              except Exception as e:
                  return {'statusCode': 500, 'body': str(e)}

  # 4. CAPA DE PROCESAMIENTO E IA (CONSUMER)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: !Ref AdminAlertTopic # <--- Aquí conectamos con el email
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10
      Code:
        ZipFile: |
          import json, boto3, os
          comprehend = boto3.client('comprehend')
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              alerta_arn = os.environ['ALERTA_TOPIC_ARN']
              for record in event['Records']:
                  sqs_body = json.loads(record['body'])
                  sns_msg = json.loads(sqs_body['Message'])
                  text = sns_msg.get('text', 'Sin texto')
                  
                  # Análisis con IA
                  res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                  sentiment = res['Sentiment']
                  print(f"Resultado: {sentiment} para el texto: {text}")
                  
                  # Si es negativo, avisar al admin
                  if sentiment == 'NEGATIVE':
                      sns.publish(
                          TopicArn=alerta_arn,
                          Message=f"ALERTA: Reseña negativa detectada.\nTexto: {text}",
                          Subject="Feedback Crítico Recibido"
                      )
              return {'status': 'done'}

  # PERMISO PARA QUE SQS ACEPTE MENSAJES DE SNS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "URL para tu index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
