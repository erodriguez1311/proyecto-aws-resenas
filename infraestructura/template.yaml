AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema Final Desacoplado - VERSION LIMPIA

Resources:
  # 1. BUCKET WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: { Ref: FrontendBucket }
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: { Fn::Sub: "arn:aws:s3:::${FrontendBucket}/*" }

  # 2. MENSAJERÍA DESACOPLADA
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: { Ref: MainTopic }
      Endpoint: { Fn::GetAtt: [ProcessingQueue, Arn] }
      Protocol: sqs

  # 3. ALERTAS EMAIL
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  EmailSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: { Ref: AdminAlertTopic }
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 4. API
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

 # 5. LAMBDA PRODUCTORA
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {'Access-Control-Allow-Origin': '*'},
                    'body': json.dumps({'msg': 'OK'})
                }
            except Exception as e:
                return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: { Ref: MainTopic }
      Policies:
        - Arn: "arn:aws:iam::aws:policy/AmazonSNSFullAccess" # <--- ARN COMPLETO PARA EVITAR ERROR
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: { Ref: MyApi }

  # 6. LAMBDA PROCESADORA
  FinalProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Timeout: 60
      MemorySize: 512
      InlineCode: |
        import json, boto3, os
        def lambda_handler(event, context):
            ia = boto3.client('comprehend', region_name='eu-west-1')
            sns = boto3.client('sns', region_name='eu-north-1')
            for record in event.get('Records', []):
                try:
                    sqs_body = json.loads(record['body'])
                    msg_content = json.loads(sqs_body['Message'])
                    text = msg_content.get('text', 'Sin texto')
                    res = ia.detect_sentiment(Text=text, LanguageCode='es')
                    sentiment = res['Sentiment']
                    if sentiment == 'NEGATIVE' or 'horrible' in text.lower():
                        sns.publish(
                            TopicArn=os.environ['ALERTA_ARN'],
                            Message=f"Reseña Crítica: {text}",
                            Subject="Alerta de Feedback"
                        )
                except Exception as e:
                    print(f"ERROR: {str(e)}")
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_ARN: { Ref: AdminAlertTopic }
      Policies:
        - Arn: "arn:aws:iam::aws:policy/ComprehendReadOnly" # <--- ARN COMPLETO
        - Arn: "arn:aws:iam::aws:policy/AmazonSNSFullAccess" # <--- ARN COMPLETO
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: { Fn::GetAtt: [ProcessingQueue, Arn] }

  # PERMISO SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ { Ref: ProcessingQueue } ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: { Fn::GetAtt: [ProcessingQueue, Arn] }

Outputs:
  ApiUrl:
    Value: { Fn::Sub: "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send" }
  WebsiteURL:
    Value: { Fn::GetAtt: [FrontendBucket, WebsiteURL] }
