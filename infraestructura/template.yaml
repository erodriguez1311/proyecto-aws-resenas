AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de reseñas desacoplado con Análisis de Sentimiento.

Resources:
  # 1. El "buzón" de entrada (SNS)
  MainTopic:
    Type: AWS::SNS::Topic

  # 2. La cola que espera (SQS) - Esto cumple el requisito de "Desacoplado"
  ProcessingQueue:
    Type: AWS::SQS::Queue

  # Unimos SNS con SQS
  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. La Lambda que procesa (El cerebro)
  ProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json, boto3
          comprehend = boto3.client('comprehend')
          def lambda_handler(event, context):
              for record in event['Records']:
                  body = json.loads(record['body'])
                  msg = json.loads(body['Message'])
                  text = msg['text']
                  res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                  print(f"Texto: {text} - Sentimiento: {res['Sentiment']}")
              return {'status': 'done'}

  # 4. El disparador: SQS activa la Lambda
  SqsEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      EventSourceArn: !GetAtt ProcessingQueue.Arn
      FunctionName: !Ref ProcessorFunction

  # 5. Permisos (IAM Role)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['sqs:ReceiveMessage', 'sqs:DeleteMessage', 'sqs:GetQueueAttributes', 'comprehend:DetectSentiment', 'logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: '*'

  # Política para que SQS acepte mensajes de SNS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic
