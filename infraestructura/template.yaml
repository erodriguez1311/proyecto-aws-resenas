AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de reseñas desacoplado con IA y Alertas (Versión Final Corregida).

Resources:
  # 1. BUCKET PARA LA WEB (CONFIGURACIÓN MODERNA)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. CAPA DE MENSAJERÍA Y DESACOPLAMIENTO
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. CAPA DE ALERTAS (EMAIL AL ADMINISTRADOR)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com" # <--- CAMBIA ESTO POR TU EMAIL
      Protocol: email

  # 4. API GATEWAY (CON CORS CONFIGURADO)
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # 5. LAMBDA PRODUCTORA (RECIBE DE LA WEB Y MANDA A SNS)
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {
