AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema completo de reseñas desacoplado con alerta por email.

Resources:
  # 1. CAPA DE MENSAJERÍA (DESACOPLAMIENTO)
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 2. CAPA DE ENTRADA (API + PRODUCER)
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors: "'*'"

  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Code:
        ZipFile: |
          import json, boto3, os
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              body = json.loads(event['body'])
              sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
              return {
                  'statusCode': 200,
                  'headers': {'Access-Control-Allow-Origin': '*'},
                  'body': json.dumps({'msg': 'Recibido'})
              }

  # 3. CAPA DE PROCESAMIENTO E IA (CONSUMER)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: !Ref AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10
      Code:
        ZipFile: |
          import json, boto3, os
          comprehend = boto3.client('comprehend')
          sns = boto3.client('sns')
          def lambda_handler(event, context):
              for record in event['Records']:
                  body = json.loads(record['body'])
                  msg = json.loads(body['Message'])
                  text = msg.get('text', '')
                  res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                  sentiment = res['Sentiment']
                  print(f"Texto: {text} | Sentimiento: {sentiment}")
                  if sentiment == 'NEGATIVE':
                      sns.publish(
                          TopicArn=os.environ['ALERTA_TOPIC_ARN'],
                          Message=f"Alerta: Reseña negativa recibida: {text}",
                          Subject="Nueva Reseña Negativa"
                      )

  # 4. CAPA DE ALERTAS (ADMINISTRADOR)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "edu.rm1992@gmail.com" 
      Protocol: email

  # PERMISO PARA QUE SQS ACEPTE MENSAJES DE SNS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "Copia esta URL en tu index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
