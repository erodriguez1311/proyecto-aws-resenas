AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de Feedback - VERSION FINAL GARANTIZADA

Resources:
  # 1. S3 BUCKET PARA WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. INFRAESTRUCTURA DE MENSAJERIA
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. ALERTA EMAIL
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "eduardo.rodriguez@alumni.immune.institute"
      Protocol: email

  # 4. API GATEWAY (Configuracion estandar SAM para CORS)
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  # 5. LAMBDA PRODUCTORA (CORS + PERMISOS)
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            # Headers obligatorios para evitar error CORS en el navegador
            headers = {
                'Access-Control-Allow-Origin': '*',
                'Access-Control-Allow-Methods': 'POST,OPTIONS',
                'Access-Control-Allow-Headers': 'Content-Type'
            }
            if event.get('httpMethod') == 'OPTIONS':
                return {'statusCode': 200, 'headers': headers, 'body': ''}
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'msg': 'OK'})}
            except Exception as e:
                return {'statusCode': 500, 'headers': headers, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi

  # 6. LAMBDA PROCESADORA (IA + ALERTA)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      InlineCode: |
        import json, boto3, os
        def lambda_handler(event, context):
            ia = boto3.client('comprehend', region_name='eu-west-1')
            sns = boto3.client('sns', region_name='eu-north-1')
            for record in event.get('Records', []):
                try:
                    sqs_body = json.loads(record['body'])
                    msg_content = json.loads(sqs_body['Message'])
                    text = msg_content.get('text', 'Sin texto')
                    res = ia.detect_sentiment(Text=text, LanguageCode='es')
                    if res['Sentiment'] == 'NEGATIVE' or 'horrible' in text.lower():
                        sns.publish(
                            TopicArn=os.environ['ALERTA_ARN'],
                            Message=f"Alerta: {text}",
                            Subject="Feedback Negativo"
                        )
                except Exception as e: print(e)
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_ARN: !Ref AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
        - SQSPollerPolicy:
            QueueName: !GetAtt ProcessingQueue.QueueName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 1

  # PERMISO DE SNS A SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn

Outputs:
  ApiUrl:
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  WebsiteURL:
    Value: !GetAtt FrontendBucket.WebsiteURL
