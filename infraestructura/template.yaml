AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema Final Desacoplado - VERSION SEGURA

Resources:
  # 1. BUCKET PARA LA WEB
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: { Ref: FrontendBucket }
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: { Fn::Sub: "arn:aws:s3:::${FrontendBucket}/*" }

  # 2. CAPA DE MENSAJERÍA (EL "PUENTE")
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  # SUSCRIPCIÓN DE LA COLA AL TEMA
  QueueToTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: { Ref: MainTopic }
      Endpoint: { Fn::GetAtt: [ProcessingQueue, Arn] }
      Protocol: sqs

  # 3. ALERTAS POR EMAIL
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  EmailSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: { Ref: AdminAlertTopic }
      Endpoint: "edu.rm1992@gmail.com"
      Protocol: email

  # 4. API GATEWAY CON CORS
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # 5. LAMBDA 1: RECIBE DE WEB Y MANDA A SNS
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json'},
                    'body': json.dumps({'msg': 'OK'})
                }
            except Exception as e:
                return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          TOPIC_ARN: { Ref: MainTopic }
      Policies:
        - SNSFullAccess # Permiso total para enviar mensajes
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: { Ref: MyApi }

# 6. LAMBDA PROCESADORA (IA + ALERTA) - CORRECCIÓN DE REGIÓN
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        # FORZAMOS A COMPREHEND A USAR IRLANDA (eu-west-1) PORQUE EN ESTOCOLMO NO EXISTE
        comprehend = boto3.client('comprehend', region_name='eu-west-1')
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            alerta_arn = os.environ['ALERTA_TOPIC_ARN']
            for record in event['Records']:
                try:
                    sqs_body = json.loads(record['body'])
                    sns_msg = json.loads(sqs_body['Message'])
                    text = sns_msg.get('text', 'Sin texto')
                    
                    # Analizamos sentimiento
                    res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                    sentimiento = res['Sentiment']
                    print(f"SENTIMIENTO: {sentimiento}")

                    if sentimiento == 'NEGATIVE':
                        sns.publish(
                            TopicArn=alerta_arn,
                            Message=f"Alerta: Reseña negativa detectada: {text}",
                            Subject="Nueva Reseña Negativa"
                        )
                except Exception as e:
                    print(f"ERROR: {str(e)}")
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: 
            Ref: AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: 
              Fn::GetAtt: [AdminAlertTopic, TopicName]
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: 
              Fn::GetAtt: [ProcessingQueue, Arn]
            BatchSize: 10

  # PERMISOS PARA QUE SNS PUEDA ESCRIBIR EN SQS
  SqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ { Ref: ProcessingQueue } ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: { Fn::GetAtt: [ProcessingQueue, Arn] }

Outputs:
  ApiUrl:
    Value: { Fn::Sub: "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send" }
  WebsiteURL:
    Value: { Fn::GetAtt: [FrontendBucket, WebsiteURL] }
