AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema de reseñas final con CORS corregido, IA y Alertas S3.

Resources:
  # 1. BUCKET PARA LA WEB (CONFIGURACIÓN MODERNA)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  # 2. CAPA DE MENSAJERÍA (DESACOPLAMIENTO)
  MainTopic:
    Type: AWS::SNS::Topic

  ProcessingQueue:
    Type: AWS::SQS::Queue

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MainTopic
      Endpoint: !GetAtt ProcessingQueue.Arn
      Protocol: sqs

  # 3. CAPA DE ALERTAS (EMAIL)
  AdminAlertTopic:
    Type: AWS::SNS::Topic

  AdminEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AdminAlertTopic
      Endpoint: "TU-EMAIL@AQUI.COM" # <--- CAMBIA ESTO POR TU EMAIL
      Protocol: email

  # 4. API GATEWAY CON CORS EXPLÍCITO
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # 5. LAMBDA PRODUCTORA
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            try:
                body = json.loads(event['body'])
                sns.publish(TopicArn=os.environ['TOPIC_ARN'], Message=json.dumps(body))
                return {
                    'statusCode': 200,
                    'headers': {
                        'Access-Control-Allow-Origin': '*',
                        'Access-Control-Allow-Headers': 'Content-Type',
                        'Access-Control-Allow-Methods': 'POST,OPTIONS',
                        'Content-Type': 'application/json'
                    },
                    'body': json.dumps({'msg': 'Reseña recibida'})
                }
            except Exception as e:
                return {
                    'statusCode': 500,
                    'headers': {'Access-Control-Allow-Origin': '*'},
                    'body': json.dumps({'error': str(e)})
                }
      Environment:
        Variables:
          TOPIC_ARN: !Ref MainTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MainTopic.TopicName
      Events:
        PostReview:
          Type: Api
          Properties:
            Path: /send
            Method: post
            RestApiId: !Ref MyApi

  # 6. LAMBDA PROCESADORA (IA + ALERTA)
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      InlineCode: |
        import json, boto3, os
        comprehend = boto3.client('comprehend')
        sns = boto3.client('sns')
        def lambda_handler(event, context):
            alerta_arn = os.environ['ALERTA_TOPIC_ARN']
            for record in event['Records']:
                sqs_body = json.loads(record['body'])
                sns_msg = json.loads(sqs_body['Message'])
                text = sns_msg.get('text', 'Sin texto')
                res = comprehend.detect_sentiment(Text=text, LanguageCode='es')
                if res['Sentiment'] == 'NEGATIVE':
                    sns.publish(
                        TopicArn=alerta_arn, 
                        Message=f"Alerta: Reseña negativa detectada: {text}", 
                        Subject="Nueva Reseña Negativa"
                    )
            return {'status': 'done'}
      Environment:
        Variables:
          ALERTA_TOPIC_ARN: !Ref AdminAlertTopic
      Policies:
        - ComprehendBasicAccessPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdminAlertTopic.TopicName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10

  # PERMISO SQS
  SqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref ProcessingQueue ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt ProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainTopic

Outputs:
  ApiUrl:
    Description: "URL para el index.html"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  WebsiteURL:
    Description: "URL de tu página web"
    Value: !GetAtt FrontendBucket.WebsiteURL
