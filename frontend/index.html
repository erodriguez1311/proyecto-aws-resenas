<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Reseñas AWS</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { background: #ff9900; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Deja tu Reseña</h1>
    <textarea id="reviewText" placeholder="Escribe aquí tu opinión..."></textarea>
    <br>
    <button onclick="enviarResena()">Enviar Reseña</button>
    <p id="status"></p>

    <script>
        async function enviarResena() {
            const text = document.getElementById('reviewText').value;
            const status = document.getElementById('status');
            
            const API_URL = "https://uk1a28u1mh.execute-api.eu-north-1.amazonaws.com/prod/send"; 

            status.innerText = "Enviando...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ text: text }),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) status.innerText = "¡Reseña enviada con éxito!";
                else status.innerText = "Error al enviar.";
            } catch (err) {
                status.innerText = "Error de conexión.";
            }
        }
    </script>
</body>
</html>
